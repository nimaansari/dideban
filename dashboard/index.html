<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>دیده‌بان | داشبورد اخبار زنده</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #06080f;
      --panel-bg:   #0b1018;
      --card-bg:    #111820;
      --card-hover: #161f2b;
      --border:     #1a2535;
      --border-hi:  #1e3a5f;
      --text:       #e2e8f0;
      --muted:      #8b949e;
      --dim:        #475569;
      --accent:     #38bdf8;
      --red:        #f85149;
      --gold:       #d29922;
      --green:      #22d3ee;
      --tg-color:   #2390d4;
      --tw-color:   #1d9bf0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Vazirmatn', 'Inter', system-ui, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ── Header ────────────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 52px;
      background: rgba(6,8,15,0.98);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
      position: relative;
    }
    #header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #f85149 0%, #d29922 40%, #38bdf8 100%);
    }

    #header .logo {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    #header .logo .logo-main {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }
    #header .logo .logo-main span { color: var(--red); }
    #header .logo .logo-sub {
      font-size: 9px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
    }

    .header-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .header-stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .header-stat b { color: var(--text); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #clock {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      direction: ltr;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: #f85149;
      letter-spacing: 1.5px;
      font-family: 'Inter', sans-serif;
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      padding: 3px 10px;
      border-radius: 20px;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #f85149;
      animation: livePulse 1.5s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(248,81,73,.5); }
      50% { opacity: 0.7; box-shadow: 0 0 0 5px rgba(248,81,73,0); }
    }

    /* ── Layout ────────────────────────────────────────────────────────── */
    #layout {
      display: grid;
      grid-template-columns: 30% 40% 30%;
      height: calc(100vh - 52px - 32px);
      gap: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      background: var(--panel-bg);
      border-left: 1px solid var(--border);
      overflow: hidden;
    }
    .panel:last-child { border-left: none; }

    /* ── Panel header ─────────────────────────────────────────────────── */
    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      height: 44px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-header .ph-icon { font-size: 15px; }
    .panel-header h2 {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-family: 'Inter', sans-serif;
    }
    .panel-header .count {
      margin-right: auto;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      background: rgba(56,189,248,0.1);
      border: 1px solid rgba(56,189,248,0.2);
      padding: 1px 8px;
      border-radius: 20px;
      min-width: 28px;
      text-align: center;
    }

    /* Filter pills */
    .filter-pills {
      display: flex;
      gap: 4px;
      margin-right: 8px;
    }
    .filter-pill {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Vazirmatn', sans-serif;
    }
    .filter-pill:hover { border-color: var(--border-hi); color: var(--muted); }
    .filter-pill.active { background: rgba(56,189,248,0.15); border-color: var(--accent); color: var(--accent); }

    /* ── News feeds ─────────────────────────────────────────────────────── */
    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* ── News card ──────────────────────────────────────────────────────── */
    .news-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border-hi);
      border-radius: 0 8px 8px 0;
      padding: 10px 12px;
      direction: rtl;
      text-align: right;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      animation: fadeIn 0.25s ease-out;
    }
    .news-card:hover {
      background: var(--card-hover);
      border-color: var(--border-hi);
      box-shadow: 0 0 20px rgba(56,189,248,0.04);
    }
    .news-card.breaking { border-left-color: var(--red); }
    .news-card.official { border-left-color: var(--gold); }
    .news-card.unverified { border-left-color: var(--dim); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: none; }
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 7px;
      flex-wrap: wrap;
    }
    .badge-channel {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      color: #fff;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }
    .badge-tg  { background: rgba(35,144,212,0.25); color: #5bc4ff; border: 1px solid rgba(35,144,212,0.3); }
    .badge-tw  { background: rgba(29,155,240,0.2); color: #60b4ff; border: 1px solid rgba(29,155,240,0.3); }

    .badge-official {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px;
      color: var(--gold);
      background: rgba(210,153,34,0.15);
      border: 1px solid rgba(210,153,34,0.3);
      white-space: nowrap;
    }
    .badge-breaking {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px;
      color: var(--red);
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.25);
    }
    .badge-unverified {
      font-size: 10px;
      padding: 2px 8px; border-radius: 10px;
      color: var(--dim);
      background: rgba(71,85,105,0.15);
      border: 1px solid rgba(71,85,105,0.2);
    }

    .card-time {
      font-size: 10px;
      color: var(--dim);
      margin-right: auto;
      direction: ltr;
      font-family: 'JetBrains Mono', monospace;
    }

    .card-text {
      font-size: 13px;
      line-height: 1.75;
      color: var(--text);
      word-break: break-word;
    }

    .card-images {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 4px;
    }
    .card-images.single { grid-template-columns: 1fr; }
    .card-img {
      width: 100%;
      max-height: 200px;
      border-radius: 6px;
      object-fit: cover;
      cursor: zoom-in;
      transition: opacity 0.2s, transform 0.2s;
      display: block;
    }
    .card-img:hover { opacity: 0.9; transform: scale(1.01); }

    .card-videos { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .card-video {
      width: 100%;
      max-height: 240px;
      border-radius: 8px;
      background: #000;
      display: block;
      outline: none;
      border: 1px solid var(--border);
    }

    /* Lightbox */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.94);
      align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw; max-height: 92vh;
      border-radius: 8px;
      box-shadow: 0 0 80px rgba(0,0,0,0.9);
      object-fit: contain;
    }
    #lightbox-close {
      position: fixed; top: 20px; right: 24px;
      color: #fff; font-size: 28px; cursor: pointer;
      line-height: 1; opacity: 0.6; z-index: 10000;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    #lightbox-close:hover { opacity: 1; background: rgba(255,255,255,0.2); }
    #lightbox-caption {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: var(--muted); font-size: 12px; text-align: center; max-width: 80vw;
    }

    /* ── Map panel ──────────────────────────────────────────────────────── */
    #map { flex: 1; min-height: 0; }

    .leaflet-popup-content-wrapper {
      background: #111820;
      color: var(--text);
      border: 1px solid var(--border-hi);
      border-radius: 8px;
      font-family: 'Vazirmatn', sans-serif;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    .leaflet-popup-tip { background: #111820; }
    .leaflet-popup-content { font-size: 12px; line-height: 1.7; direction: rtl; }

    /* ── Stats footer ───────────────────────────────────────────────────── */
    #stats-bar {
      height: 32px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--dim);
      padding: 0 20px;
      flex-shrink: 0;
    }
    #stats-bar span b { color: var(--text); }
    #stats-bar .sep { color: var(--border-hi); }

    /* ── Connection indicator ───────────────────────────────────────────── */
    #conn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background 0.4s;
    }
    #conn-dot.connected    { background: #22c55e; }
    #conn-dot.disconnected { background: var(--red); }

    /* ── Empty state ─────────────────────────────────────────────────── */
    .empty {
      text-align: center;
      color: var(--dim);
      font-size: 12px;
      padding: 32px 12px;
    }

    /* ── Mobile tabs ──────────────────────────────────────────────────── */
    #mobile-tabs {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 999;
      background: var(--bg);
      border-top: 1px solid var(--border);
      height: 56px;
    }
    .mob-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--dim);
      cursor: pointer;
      gap: 3px;
      border: none;
      background: none;
      padding: 0;
    }
    .mob-tab .ti { font-size: 20px; }
    .mob-tab.active { color: var(--accent); }

    /* ── Responsive ───────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }

      #header {
        height: 48px;
        padding: 0 12px;
      }
      #header .logo .logo-main { font-size: 15px; }
      #header .logo .logo-sub { display: none; }
      .header-center { display: none; }
      #clock { font-size: 11px; }

      #layout {
        display: block;
        height: auto;
        min-height: calc(100vh - 48px - 32px);
      }

      .panel {
        display: none;
        border-left: none;
        border-top: 1px solid var(--border);
        height: calc(100vh - 48px - 56px);
        overflow: hidden;
      }
      .panel.active { display: flex; }

      #map { height: calc(100vh - 48px - 44px - 56px); }

      #stats-bar {
        display: none;
      }

      #mobile-tabs {
        display: flex;
      }

      body { padding-bottom: 56px; }

      .panel-header .filter-pills { display: none; }
    }

    @media (max-width: 480px) {
      .news-card { padding: 8px 10px; }
      .card-text { font-size: 12px; }
      .badge-channel { font-size: 9px; }
    }
  </style>
</head>
<body>

<!-- ══ Header ════════════════════════════════════════════════════════════ -->
<div id="header">
  <div class="logo">
    <div class="logo-main">دیده<span>بان</span></div>
    <div class="logo-sub">OSINT Intelligence</div>
  </div>
  <div class="header-center">
    <div class="header-stat">📡 <b id="hdr-events">0</b> رویداد</div>
    <div class="header-stat" style="color:var(--border-hi)">|</div>
    <div class="header-stat">🗺 <b id="hdr-locs">0</b> لوکیشن</div>
    <div class="header-stat" style="color:var(--border-hi)">|</div>
    <div class="header-stat"><div id="conn-dot"></div>&nbsp;<span id="status-text" style="font-family:Vazirmatn">در حال اتصال…</span></div>
  </div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
</div>

<!-- ══ Main layout ════════════════════════════════════════════════════════ -->
<div id="layout">

  <!-- ── Left panel: Telegram ───────────────────────────────────────── -->
  <div class="panel active" id="panel-tg">
    <div class="panel-header">
      <span class="ph-icon">📡</span>
      <h2>TELEGRAM INTEL</h2>
      <div class="filter-pills">
        <button class="filter-pill active" onclick="filterFeed('tg','all',this)">همه</button>
        <button class="filter-pill" onclick="filterFeed('tg','breaking',this)">🔴</button>
        <button class="filter-pill" onclick="filterFeed('tg','official',this)">🎙</button>
        <button class="filter-pill" onclick="filterFeed('tg','unverified',this)">❓</button>
      </div>
      <span class="count" id="tg-count">0</span>
    </div>
    <div class="feed" id="tg-feed">
      <div class="empty">در انتظار اخبار…</div>
    </div>
  </div>

  <!-- ── Middle panel: Map ──────────────────────────────────────────── -->
  <div class="panel" id="panel-map">
    <div class="panel-header">
      <span class="ph-icon">🗺</span>
      <h2>LIVE OPERATIONS MAP</h2>
      <span class="count" id="loc-count">0</span>
    </div>
    <div id="map"></div>
  </div>

  <!-- ── Right panel: Twitter / X ───────────────────────────────────── -->
  <div class="panel" id="panel-tw">
    <div class="panel-header">
      <span class="ph-icon">𝕏</span>
      <h2>INTELLIGENCE FEED</h2>
      <div class="filter-pills">
        <button class="filter-pill active" onclick="filterFeed('tw','all',this)">All</button>
        <button class="filter-pill" onclick="filterFeed('tw','breaking',this)">🔴</button>
        <button class="filter-pill" onclick="filterFeed('tw','official',this)">🎙</button>
      </div>
      <span class="count" id="tw-count">0</span>
    </div>
    <div class="feed" id="tw-feed">
      <div class="empty">در انتظار اخبار…</div>
    </div>
  </div>

</div><!-- /#layout -->

<!-- Mobile tab bar -->
<div id="mobile-tabs">
  <button class="mob-tab active" onclick="showTab('tg')">
    <span class="ti">📡</span>
    <span>تلگرام</span>
  </button>
  <button class="mob-tab" onclick="showTab('map')">
    <span class="ti">🗺</span>
    <span>نقشه</span>
  </button>
  <button class="mob-tab" onclick="showTab('tw')">
    <span class="ti">𝕏</span>
    <span>فید</span>
  </button>
</div>

<!-- Stats footer -->
<div id="stats-bar">
  <span>📡 <b id="stat-events">0</b> رویداد</span>
  <span class="sep">·</span>
  <span>🗺 <b id="stat-locs">0</b> لوکیشن</span>
  <span class="sep">·</span>
  <span>⏱ آخرین آپدیت: <b id="stat-time">--:--</b></span>
  <span class="sep">·</span>
  <span>منابع: تلگرام · X · MahsaAlert · WarStrikes · INSS</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════════════════
const state = {
  tgItems: [],   // [{id, channel, text, timestamp, official}]
  twItems: [],
  locations: {}, // {id: {id, name, lat, lon, text_snippet, timestamp}}
  markers: {},   // {id: L.circleMarker}
};

// ═══════════════════════════════════════════════════════════════════════════
//  Leaflet map
// ═══════════════════════════════════════════════════════════════════════════
const map = L.map('map', {
  center: [32, 42],
  zoom: 5,
  zoomControl: true,
});

// Dark background (no labels)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OSM &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// Persian labels via Wikimedia Maps (supports lang=fa)
L.tileLayer('https://maps.wikimedia.org/osm-intl/{z}/{x}/{y}.png?lang=fa', {
  attribution: '&copy; Wikimedia Maps',
  maxZoom: 19,
  opacity: 0.8,
}).addTo(map);

// ── MahsaAlert SVG icons (inline, no CORS) ───────────────────────────────────
function makeSvgIcon(emoji, bgColor, size=32) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${size/2-1}" fill="${bgColor}" stroke="white" stroke-width="1.5" opacity="0.92"/>
    <text x="${size/2}" y="${size/2+5}" text-anchor="middle" font-size="${size*0.5}px">${emoji}</text>
  </svg>`;
  const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  return L.icon({ iconUrl: url, iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -size/2] });
}

const ICONS = {
  confirmed: makeSvgIcon('💥', '#cc0000', 34),
  unconfirmed: makeSvgIcon('🎯', '#cc6600', 30),
  missile: makeSvgIcon('🚀', '#880000', 32),
  radar: makeSvgIcon('📡', '#444400', 30),
  nuclear: makeSvgIcon('☢️', '#006600', 30),
  military: makeSvgIcon('⚔️', '#550055', 30),
};

function getWarIcon(props) {
  const name = (props['name:fa'] || '');
  if (name.includes('رادار')) return ICONS.radar;
  if (name.includes('موشک')) return ICONS.missile;
  if (name.includes('هسته') || name.includes('اتمی')) return ICONS.nuclear;
  if (name.includes('پایگاه') || name.includes('قرارگاه')) return ICONS.military;
  if (props.status === 'تایید شده') return ICONS.confirmed;
  return ICONS.unconfirmed;
}

// ── Load MahsaAlert war targets (layer 32) ──────────────────────────────────
async function loadMahsaAlertData() {
  try {
    const res = await fetch('https://mahsaalert.hel1.your-objectstorage.com/prod/sources/layers/32/targets-26-02.geojson');
    const data = await res.json();
    let count = 0;
    data.features.forEach(f => {
      if (f.geometry?.type !== 'Point') return;
      const [lon, lat] = f.geometry.coordinates;
      const name = f.properties['name:fa'] || f.properties.name || 'هدف';
      const status = f.properties.status || '';
      const sources = f.properties.sources || f.properties.geolocates || '';
      const icon = getWarIcon(f.properties);
      const marker = L.marker([lat, lon], { icon }).addTo(map);
      const srcLink = sources ? `<br><a href="${sources}" target="_blank" style="color:#aaa;font-size:10px">منبع ↗</a>` : '';
      marker.bindPopup(`<div style="direction:rtl;min-width:160px">
        <b>${name}</b><br>

// ── WarStrikes.com — Global strike trajectories ───────────────────────────────
async function translateText(text) {
  if (!text) return text;
  try {
    const r = await fetch(`/api/translate?text=${encodeURIComponent(text)}`);
    const d = await r.json();
    return d.result || text;
  } catch { return text; }
}

async function loadWarStrikesData() {
  try {
    const res = await fetch('https://warstrikes.com/api/events');
    const data = await res.json();
    let count = 0;
    for (const e of (data.events || [])) {
      const iLat = e.impact_lat, iLon = e.impact_lng;
      const oLat = e.origin_lat, oLon = e.origin_lng;
      if (!iLat || !iLon || iLat === 0) continue;

      // Translate title and summary to Persian
      const title = await translateText(e.title || 'حمله');
      const summary = await translateText((e.summary || '').slice(0, 200));

      // Impact point — red pulsing circle
      const impact = L.circleMarker([iLat, iLon], {
        radius: 8, fillColor: '#ff2222', color: '#ff0000',
        weight: 2, opacity: 0.9, fillOpacity: 0.75,
      }).addTo(map);
      const pop = `<div style="direction:rtl;font-family:inherit;min-width:200px">
        <b style="font-size:12px;color:#f43f5e">💥 رویداد نظامی</b><br>
        <span style="font-size:12px;color:#e2e8f0">${title}</span><br>
        <span style="font-size:11px;color:#94a3b8">${summary}</span><br>
        <span style="font-size:10px;color:#475569">📅 ${(e.published_at||'').slice(0,10)}</span><br>
        <a href="${e.link_news||'#'}" target="_blank" style="color:#38bdf8;font-size:10px">🔗 منبع: WarStrikes ↗</a>
      </div>`;
      impact.bindPopup(pop);

      // Trajectory arrow — dashed blue line from origin to impact
      if (oLat && oLon && oLat !== 0 && oLon !== 0) {
        L.polyline([[oLat, oLon], [iLat, iLon]], {
          color: '#3b82f6', weight: 1.5, opacity: 0.6,
          dashArray: '6, 10',
        }).addTo(map);
        // Origin dot
        L.circleMarker([oLat, oLon], {
          radius: 4, fillColor: '#3b82f6', color: '#2563eb',
          weight: 1, opacity: 0.7, fillOpacity: 0.5,
        }).addTo(map);
      }
      count++;
    }
    console.log(`WarStrikes: ${count} events loaded`);
    document.getElementById('ws-count') && (document.getElementById('ws-count').textContent = count);
  } catch(e) { console.warn('WarStrikes failed:', e); }
}
loadWarStrikesData();
setInterval(loadWarStrikesData, 5 * 60 * 1000);

function addMarker(loc) {
  if (state.markers[loc.id]) return; // already on map

  const marker = L.circleMarker([loc.lat, loc.lon], {
    radius: 8,
    fillColor: '#ef4444',
    color: '#ff6b6b',
    weight: 2,
    opacity: 0.9,
    fillOpacity: 0.75,
  });

  const time = formatTime(loc.timestamp);
  marker.bindPopup(`
    <div class="popup-name">📍 ${escHtml(loc.name)}</div>
    <div class="popup-snippet">${escHtml(loc.text_snippet)}</div>
    <div class="popup-time">${time}</div>
  `);

  marker.addTo(map);
  state.markers[loc.id] = marker;
}

function removeMarker(id) {
  if (state.markers[id]) {
    map.removeLayer(state.markers[id]);
    delete state.markers[id];
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  Rendering helpers
// ═══════════════════════════════════════════════════════════════════════════
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    if (isNaN(d)) return ts;
    return d.toLocaleString('fa-IR', {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  } catch { return ts; }
}

function buildCard(item) {
  const isOfficial  = !!item.official;
  const isTg        = item.source === 'telegram';
  const text        = item.text || '';
  const isBreaking  = text.includes('#فوری') || text.includes('BREAKING') || text.includes('فوری');
  const isUnverified= text.includes('تأییدنشده') || text.includes('گزارش‌های مردمی');

  const cardClass = isOfficial ? 'official' : isBreaking ? 'breaking' : isUnverified ? 'unverified' : '';
  const badgeClass = isTg ? 'badge-tg' : 'badge-tw';
  const badgeLabel = isTg ? `@${escHtml(item.channel)}` : escHtml(item.channel);
  const proxyImg = src => `/api/proxy-img?url=${encodeURIComponent(src)}`;
  const imagesHtml = (item.images && item.images.length > 0)
    ? `<div class="card-images${item.images.length === 1 ? ' single' : ''}">
        ${item.images.map(src => `<img src="${proxyImg(src)}" class="card-img" loading="lazy" onerror="this.style.display='none'" onclick="openLightbox('${proxyImg(src)}','${escHtml(item.channel||'')}')">`).join('')}
      </div>` : '';
  const videosHtml = (item.videos && item.videos.length > 0)
    ? `<div class="card-videos">${item.videos.map(v => `
        <video class="card-video" controls controlsList="nodownload" preload="metadata"${v.thumb ? ` poster="${escHtml(v.thumb)}"` : ''}>
          <source src="${escHtml(v.src)}" type="video/mp4">
        </video>`).join('')}</div>` : '';

  return `<div class="news-card ${cardClass}" data-id="${escHtml(item.id)}">
    <div class="card-meta">
      <span class="badge-channel ${badgeClass}">${badgeLabel}</span>
      ${isOfficial ? '<span class="badge-official">🎙 رسمی</span>' : ''}
      ${isBreaking ? '<span class="badge-breaking">🔴 فوری</span>' : ''}
      ${isUnverified ? '<span class="badge-unverified">❓ تأییدنشده</span>' : ''}
      <span class="card-time">${formatTime(item.timestamp)}</span>
    </div>
    ${text ? `<div class="card-text">${escHtml(text)}</div>` : ''}
    ${imagesHtml}${videosHtml}
  </div>`;
}

function prependCard(feedEl, item) {
  // Remove empty placeholder if present
  const empty = feedEl.querySelector('.empty');
  if (empty) empty.remove();

  // Avoid duplicates
  if (feedEl.querySelector(`[data-id="${item.id}"]`)) return;

  const div = document.createElement('div');
  div.innerHTML = buildCard(item).trim();
  feedEl.insertBefore(div.firstChild, feedEl.firstChild);
}

// ═══════════════════════════════════════════════════════════════════════════
//  Locations list
// ═══════════════════════════════════════════════════════════════════════════
function renderLocList() {
  const locs = Object.values(state.locations);
  document.getElementById('loc-count').textContent = locs.length;
  document.getElementById('stat-locs').textContent = locs.length;
  document.getElementById('hdr-locs').textContent = locs.length;
  const listEl = document.getElementById('loc-list');
  if (!listEl) return;

  if (!locs.length) {
    listEl.innerHTML = '<div class="empty" style="padding:8px 4px">هیچ مکانی ثبت نشده</div>';
    return;
  }

  listEl.innerHTML = locs.map(loc => `
    <div class="loc-item" data-loc-id="${escHtml(loc.id)}">
      <div class="loc-dot"></div>
      <span class="loc-name">${escHtml(loc.name)}</span>
      <button class="loc-del" title="حذف" onclick="deleteLocation('${escHtml(loc.id)}')">❌</button>
    </div>`).join('');
}

async function deleteLocation(id) {
  try {
    await fetch(`/api/locations/${id}`, { method: 'DELETE' });
    // SSE will broadcast; handle optimistically too
    delete state.locations[id];
    removeMarker(id);
    renderLocList();
  } catch (e) {
    console.error('Delete location failed', e);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  SSE message handlers
// ═══════════════════════════════════════════════════════════════════════════
function handleSnapshot(data) {
  const tgFeed = document.getElementById('tg-feed');
  const twFeed = document.getElementById('tw-feed');

  // Clear
  tgFeed.innerHTML = '';
  twFeed.innerHTML = '';

  // Events (newest first from server already)
  const tgItems = data.events.filter(e => e.source === 'telegram');
  const twItems = data.events.filter(e => e.source === 'twitter');

  // Render oldest-first so newest ends up on top after insertBefore loop
  [...tgItems].reverse().forEach(item => {
    state.tgItems.push(item);
    prependCard(tgFeed, item);
  });
  [...twItems].reverse().forEach(item => {
    state.twItems.push(item);
    prependCard(twFeed, item);
  });

  if (!tgItems.length) tgFeed.innerHTML = '<div class="empty">در انتظار اخبار…</div>';
  if (!twItems.length) twFeed.innerHTML = '<div class="empty">در انتظار اخبار…</div>';

  // Update counters from actual data
  const total = data.events.length;
  document.getElementById('stat-events').textContent = total;
  document.getElementById('hdr-events').textContent = total;
  document.getElementById('tg-count').textContent = tgItems.length;
  document.getElementById('tw-count').textContent = twItems.length;

  document.getElementById('tg-count').textContent = tgItems.length;
  document.getElementById('tw-count').textContent = twItems.length;

  // Locations
  data.locations.forEach(loc => {
    state.locations[loc.id] = loc;
    addMarker(loc);
  });
  renderLocList();
}

function handleNews(item) {
  const tgFeed = document.getElementById('tg-feed');
  const twFeed = document.getElementById('tw-feed');

  if (item.source === 'telegram') {
    state.tgItems.unshift(item);
    prependCard(tgFeed, item);
    document.getElementById('tg-count').textContent = state.tgItems.length;
  } else {
    state.twItems.unshift(item);
    prependCard(twFeed, item);
    document.getElementById('tw-count').textContent = state.twItems.length;
  }
}

function handleLocationAdd(loc) {
  state.locations[loc.id] = loc;
  addMarker(loc);
  renderLocList();
}

function handleLocationRemove({ id }) {
  delete state.locations[id];
  removeMarker(id);
  renderLocList();
}

// ═══════════════════════════════════════════════════════════════════════════
//  SSE connection
// ═══════════════════════════════════════════════════════════════════════════
const connDot    = document.getElementById('conn-dot');
const statusText = document.getElementById('status-text');
let reconnectDelay = 2000;

function setConnStatus(connected, msg) {
  connDot.className = connected ? 'connected' : 'disconnected';
  statusText.textContent = msg;
}

function connectSSE() {
  setConnStatus(false, 'در حال اتصال…');
  const es = new EventSource('/events');

  es.onopen = () => {
    reconnectDelay = 2000;
    setConnStatus(true, 'اتصال برقرار — داده‌های زنده دریافت می‌شود');
  };

  es.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    switch (msg.type) {
      case 'snapshot':       handleSnapshot(msg.data);      break;
      case 'news':           handleNews(msg.data);           break;
      case 'location_add':   handleLocationAdd(msg.data);   break;
      case 'location_remove':handleLocationRemove(msg.data);break;
    }
    const now = new Date().toLocaleTimeString('fa-IR');
    setConnStatus(true, `آخرین به‌روزرسانی: ${now}`);
  };

  es.onerror = () => {
    es.close();
    setConnStatus(false, `قطع اتصال — تلاش مجدد در ${reconnectDelay/1000}s…`);
    setTimeout(connectSSE, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
  };
}

// ═══════════════════════════════════════════════════════════════════════════
//  Boot
// ═══════════════════════════════════════════════════════════════════════════
connectSSE();
</script>

<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
</div>
<script>
function openLightbox(src, caption) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-caption').textContent = caption || '';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
  document.body.style.overflow = '';
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Clock + stats bar
function updateClock() {
  const now = new Date();
  const t = now.toLocaleTimeString('fa-IR');
  document.getElementById('clock').textContent = t;
  document.getElementById('stat-time').textContent = now.toLocaleTimeString('fa-IR', {hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// Filter feed
function filterFeed(panel, type, btn) {
  const feedId = panel === 'tg' ? 'tg-feed' : 'tw-feed';
  const feed = document.getElementById(feedId);
  // Update active pill
  btn.closest('.filter-pills').querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  // Show/hide cards
  feed.querySelectorAll('.news-card').forEach(card => {
    if (type === 'all') { card.style.display = ''; return; }
    card.style.display = card.classList.contains(type) ? '' : 'none';
  });
}

// Mobile tab switching
function showTab(tab) {
  ['tg','map','tw'].forEach(t => {
    const panel = document.getElementById('panel-' + t) || document.getElementById('map-panel');
    if (panel) panel.classList.remove('active');
  });
  const target = document.getElementById('panel-' + tab);
  if (target) {
    target.classList.add('active');
    // Trigger map resize when switching to map tab
    if (tab === 'map' && window.map) setTimeout(() => map.invalidateSize(), 100);
  }
  document.querySelectorAll('.mob-tab').forEach((btn, i) => {
    btn.classList.toggle('active', ['tg','map','tw'][i] === tab);
  });
}

// Update event count in header/stats
const origPrep = window.prependCard;
